<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pedidos — Mapa colaborativo</title>

<!-- ===========================================================
     CONFIGURACIÓN — editá solo este bloque para personalizar
     -----------------------------------------------------------
     API_URL vacío  -> modo LOCAL (solo este dispositivo).
     API_URL "/api" -> COLABORATIVO (via Worker de Cloudflare).
     CENTER/ZOOM    -> vista inicial del mapa.
     CATEGORIAS     -> lista de categorías (v, label, emoji, color).
     FEATURES       -> activar/desactivar módulos opcionales.
     =========================================================== -->
<script>
  const CONFIG = {
    API_URL: "/api",
    CENTER: [10.609995078010172, -66.88176226279427],
    ZOOM: 12
  };

  const CATEGORIAS = [
    { v: "alimentos",    label: "Alimentos",          emoji: "🍽", color: "#1f9d57" },
    { v: "medicamentos", label: "Medicamentos",        emoji: "💊", color: "#c8412f" },
    { v: "agua",         label: "Agua / Suministros",  emoji: "💧", color: "#0aa6b8" },
    { v: "alojamiento",  label: "Alojamiento",         emoji: "🏠", color: "#d98a04" },
    { v: "transporte",   label: "Transporte",          emoji: "🚗", color: "#7c3aed" },
    { v: "otros",        label: "Otros",               emoji: "📦", color: "#5c6b7e" }
  ];

  const FEATURES = {
    panel:  true,  // botón de lista + nearest en topbar
    recent: true   // panel top-left con últimos 3 pedidos abiertos
  };
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{
    --ink:#0f1b2d;
    --surface:#ffffff;
    --surface-2:#f3f6fa;
    --line:#dbe3ec;
    --muted:#5c6b7e;
    --signal:#0aa6b8;
    --signal-ink:#06727f;
    --closed:#8593a3;
    --danger:#c8412f;
    --shadow:0 6px 24px rgba(15,27,45,.16);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--surface-2);color:var(--ink)}
  body{overflow:hidden}

  /* ---- Barra superior ---- */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:1000;
    display:flex;align-items:center;gap:12px;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background:var(--ink);color:#fff;box-shadow:var(--shadow);
  }
  .topbar .dot{width:10px;height:10px;border-radius:50%;background:var(--signal);
    box-shadow:0 0 0 4px rgba(10,166,184,.25);flex:none}
  .topbar h1{font-size:15px;font-weight:650;margin:0;line-height:1.15;letter-spacing:.2px}
  .topbar p{margin:1px 0 0;font-size:11.5px;color:#aab8c9;font-weight:500}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex:none}
  .count{text-align:right;flex:none}
  .count b{font-size:18px;font-weight:700;display:block;line-height:1}
  .count span{font-size:10px;color:#aab8c9;text-transform:uppercase;letter-spacing:.6px}

  /* ---- Mapa ---- */
  #map{position:absolute;inset:0;top:0;height:100%;width:100%;background:#aac4d8}

  /* ---- Aviso modo local ---- */
  .banner{
    position:fixed;left:10px;right:10px;top:64px;z-index:900;
    background:#fff4dc;border:1px solid #f0d28a;color:#6b4e07;
    padding:8px 12px;border-radius:10px;font-size:12px;font-weight:500;
    box-shadow:var(--shadow);display:none;align-items:center;gap:8px;
  }
  .banner.show{display:flex}

  /* ---- Leyenda ---- */
  .legend{
    position:fixed;left:10px;bottom:calc(env(safe-area-inset-bottom) + 86px);z-index:800;
    background:var(--surface);border:1px solid var(--line);border-radius:10px;
    padding:8px 10px;font-size:11.5px;box-shadow:var(--shadow);line-height:1.85;
  }
  .legend svg{display:inline-block;vertical-align:middle;margin-right:5px}

  /* ---- FAB Publicar ---- */
  .fab{
    position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 18px);z-index:900;
    border:none;cursor:pointer;
    background:var(--signal);color:#fff;font-weight:650;font-size:15px;
    padding:14px 22px;border-radius:999px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:8px;
  }
  .fab:active{transform:translateX(-50%) scale(.97)}
  .fab svg{width:18px;height:18px}

  /* ---- Hoja del formulario ---- */
  .scrim{position:fixed;inset:0;background:rgba(15,27,45,.45);z-index:1100;
    opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:1200;
    background:var(--surface);border-radius:20px 20px 0 0;
    padding:14px 16px calc(env(safe-area-inset-bottom) + 16px);
    box-shadow:0 -8px 30px rgba(15,27,45,.25);
    transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.7,.2,1);
    max-height:90vh;overflow-y:auto;
  }
  .sheet.show{transform:translateY(0)}
  .grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:2px auto 14px}
  .sheet-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px}
  .sheet-header h2{margin:0;font-size:17px;font-weight:680}
  .sheet-close{border:none;background:none;cursor:pointer;font-size:22px;
    color:var(--muted);padding:0 0 0 10px;line-height:1;flex:none}
  .sheet-close:hover{color:var(--ink)}
  .sheet .hint{margin:0 0 16px;font-size:12.5px;color:var(--muted)}

  /* ---- Desktop: panel lateral (≥640px) ---- */
  @media(min-width:640px){
    .sheet{
      left:auto;right:0;bottom:0;top:58px;
      width:360px;border-radius:20px 0 0 20px;
      max-height:none;height:calc(100vh - 58px);
      transform:translateX(110%);
    }
    .sheet.show{transform:translateX(0)}
    .scrim.show{background:rgba(15,27,45,.08);pointer-events:none}
    .sheet{pointer-events:auto}
    .grip{display:none}
  }

  /* ---- Campos del formulario ---- */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--ink)}
  .field input[type=text],.field input[type=tel],.field textarea{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;background:var(--surface-2);color:var(--ink);font-family:inherit;
  }
  .field textarea{resize:none;min-height:80px}
  .field input:focus,.field textarea:focus{outline:2px solid var(--signal);outline-offset:1px;background:#fff}

  /* Chips de categoría */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    display:inline-flex;align-items:center;gap:5px;
    padding:9px 14px;border-radius:999px;
    border:1.5px solid var(--line);background:var(--surface-2);
    font-size:13px;font-weight:600;color:var(--muted);
    cursor:pointer;white-space:nowrap;
    transition:background .13s,color .13s,border-color .13s;
  }
  .chip:active{opacity:.8}

  /* Campo con prefijo @ */
  .prefix-wrap{display:flex;align-items:center;border:1px solid var(--line);
    border-radius:10px;background:var(--surface-2);overflow:hidden}
  .prefix-wrap:focus-within{outline:2px solid var(--signal);outline-offset:1px;background:#fff}
  .prefix-wrap .pfx{padding:11px 0 11px 12px;font-size:15px;color:var(--muted);user-select:none}
  .prefix-wrap input{border:none;outline:none;background:transparent;
    padding:11px 12px;flex:1;font-size:15px;color:var(--ink);font-family:inherit}

  /* Selector de ubicación */
  .loc-row{display:flex;gap:8px;align-items:stretch}
  .loc-row .locbox{
    flex:1;min-width:0;display:flex;align-items:center;padding:10px 12px;
    border:1px dashed var(--line);border-radius:10px;background:var(--surface-2);
    font-size:12.5px;color:var(--muted);
  }
  .loc-row .locbox.set{border-style:solid;color:var(--ink);font-weight:600}
  .btn-ghost{
    border:1px solid var(--signal);background:#fff;color:var(--signal-ink);
    font-weight:650;font-size:13px;border-radius:10px;padding:0 14px;cursor:pointer;white-space:nowrap;
  }
  .btn-ghost:active{background:var(--surface-2)}

  .submit{
    width:100%;margin-top:4px;padding:14px;border:none;border-radius:12px;cursor:pointer;
    background:var(--signal);color:#fff;font-size:16px;font-weight:680;
  }
  .submit:disabled{opacity:.5}
  .submit:active:not(:disabled){transform:scale(.99)}
  .err{color:var(--danger);font-size:12px;font-weight:600;margin:6px 0 0;min-height:14px}

  /* ---- Popups ---- */
  .pop b{font-size:14px;line-height:1.35}
  .pop .meta{font-size:12px;color:var(--muted);margin:3px 0 0}
  .pop .tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;margin-top:4px}
  .pop .contact{display:flex;flex-direction:column;gap:3px;margin-top:6px}
  .pop .contact a{font-size:12px;font-weight:600;color:var(--signal-ink);text-decoration:none}
  .pop .contact a:hover{text-decoration:underline}
  .pop .actions{display:flex;gap:6px;margin-top:9px}
  .pop .actions a{
    flex:1;text-align:center;text-decoration:none;font-size:12px;font-weight:650;
    padding:8px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);
  }
  .pop .actions .go{background:var(--signal);color:#fff;border-color:var(--signal)}

  /* ---- Toast ---- */
  .toast{
    position:fixed;left:50%;transform:translateX(-50%) translateY(20px);
    bottom:calc(env(safe-area-inset-bottom) + 90px);z-index:1300;
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;
    font-size:13px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header class="topbar">
  <span class="dot" aria-hidden="true"></span>
  <div>
    <h1>Pedidos</h1>
    <p id="mode-label">Cargando…</p>
  </div>
  <div class="topbar-right">
    <div class="count"><b id="count-open">0</b><span>abiertos</span></div>
  </div>
</header>

<div id="banner" class="banner" role="status">
  <span>⚠️ Modo local: lo que cargues solo se ve en este equipo. Conecta el backend para compartir.</span>
</div>

<div id="map" role="application" aria-label="Mapa de pedidos y solicitudes"></div>

<div id="legend" class="legend" aria-hidden="true"></div>

<button class="fab" id="open-form" aria-haspopup="dialog">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  Publicar pedido
</button>

<!-- Hoja del formulario -->
<div class="scrim" id="scrim"></div>
<form class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
  <div class="grip"></div>
  <div class="sheet-header">
    <h2 id="sheet-title">Publicar un pedido</h2>
    <button type="button" class="sheet-close" id="close-form" aria-label="Cerrar formulario">✕</button>
  </div>
  <p class="hint">Deja tu teléfono para que puedan contactarte.</p>

  <div class="field">
    <label for="f-tel">Teléfono de contacto <span style="color:var(--danger)" aria-hidden="true">*</span></label>
    <input type="tel" id="f-tel" placeholder="Ej: +58 412 555 1234" maxlength="30" autocomplete="tel">
  </div>

  <div class="field">
    <label>Categoría <span style="color:var(--danger)" aria-hidden="true">*</span></label>
    <div class="chips" id="chips-cat"></div>
  </div>

  <div class="field">
    <label for="f-pedido">¿Qué necesitas? <span style="color:var(--danger)" aria-hidden="true">*</span></label>
    <textarea id="f-pedido" placeholder="Ej: Necesito insulina para diabético. Urgente." maxlength="200" autocomplete="off" rows="3"></textarea>
  </div>

  <div class="field">
    <label>Ubicación <span style="color:var(--danger)" aria-hidden="true">*</span></label>
    <div class="loc-row">
      <div class="locbox" id="locbox">Elige en el mapa o usa tu GPS →</div>
      <button type="button" class="btn-ghost" id="use-gps">Mi ubicación</button>
    </div>
  </div>

  <div class="field">
    <label for="f-ig">Instagram <span style="color:var(--muted);font-weight:500">(opcional)</span></label>
    <div class="prefix-wrap">
      <span class="pfx">@</span>
      <input type="text" id="f-ig" placeholder="usuario" maxlength="30" autocomplete="off" autocapitalize="none" spellcheck="false">
    </div>
  </div>

  <button type="submit" class="submit" id="submit-btn">Publicar pedido</button>
  <p class="err" id="form-err" aria-live="polite"></p>
</form>

<div class="toast" id="toast" role="status"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function(){
  "use strict";
  const LS_KEY = "tickets_v1";
  const LOCAL  = !CONFIG.API_URL;

  // ---------- Estado ----------
  let tickets    = [];
  let pickLatLng = null;
  let pickMarker = null;
  let categoria  = CATEGORIAS[0].v;
  const markers  = {};

  // ---------- Chips de categoría ----------
  (function buildChips(){
    const container = document.getElementById("chips-cat");
    CATEGORIAS.forEach((c, i) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "chip";
      btn.dataset.v = c.v;
      btn.textContent = c.emoji + " " + c.label;
      btn.setAttribute("aria-pressed", i === 0 ? "true" : "false");
      if (i === 0) _chipOn(btn, c);
      btn.addEventListener("click", () => {
        categoria = c.v;
        container.querySelectorAll(".chip").forEach(b => {
          const active = b.dataset.v === c.v;
          b.setAttribute("aria-pressed", active ? "true" : "false");
          if (active) _chipOn(b, c); else _chipOff(b);
        });
      });
      container.appendChild(btn);
    });
  })();

  function _chipOn(btn, cat){
    btn.style.background  = cat.color;
    btn.style.borderColor = cat.color;
    btn.style.color       = "#fff";
  }
  function _chipOff(btn){
    btn.style.background  = "";
    btn.style.borderColor = "";
    btn.style.color       = "";
  }

  // ---------- Leyenda dinámica ----------
  function _pinSvg(color){
    return `<svg viewBox="0 0 24 32" width="9" height="12" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C7.6 0 4 3.6 4 8c0 6 8 20 8 20s8-14 8-20c0-4.4-3.6-8-8-8z" fill="${color}"/></svg>`;
  }
  document.getElementById("legend").innerHTML =
    CATEGORIAS.map(c =>
      `<div>${_pinSvg(c.color)}${c.emoji} ${c.label}</div>`
    ).join("") +
    `<div>${_pinSvg("#8593a3")}Cerrado</div>`;

  // ---------- Mapa ----------
  const map = L.map("map", { zoomControl: false }).setView(CONFIG.CENTER, CONFIG.ZOOM);
  L.control.zoom({ position: "bottomright" }).addTo(map);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19, attribution: "© OpenStreetMap"
  }).addTo(map);

  function colorFor(t){
    if (t.status === "closed") return "#8593a3";
    const cat = CATEGORIAS.find(c => c.v === t.categoria);
    return cat ? cat.color : "#5c6b7e";
  }

  function icon(t){
    const c = colorFor(t);
    return L.divIcon({
      className: "", iconSize: [22, 29], iconAnchor: [11, 29],
      html: `<svg viewBox="0 0 24 32" width="22" height="29" xmlns="http://www.w3.org/2000/svg" style="display:block;filter:drop-shadow(0 1px 3px rgba(0,0,0,.35))">
        <path d="M12 0C7.6 0 4 3.6 4 8c0 6 8 20 8 20s8-14 8-20c0-4.4-3.6-8-8-8z" fill="${c}"/>
        <circle cx="12" cy="8" r="3.5" fill="white" opacity=".9"/>
      </svg>`
    });
  }

  function popupHtml(t){
    const cat    = CATEGORIAS.find(c => c.v === t.categoria) || { label: t.categoria || "Otros", emoji: "📦", color: "#5c6b7e" };
    const closed = t.status === "closed";
    const tagBg    = closed ? "#eceff3" : cat.color + "22";
    const tagColor = closed ? "#8593a3" : cat.color;
    const tag      = `<span class="tag" style="background:${tagBg};color:${tagColor}">${cat.emoji} ${cat.label}</span>`;
    const when     = t.ts ? `<div class="meta">Publicado ${ago(t.ts)}</div>` : "";
    const tel      = t.telefono ? `<a href="tel:${esc(t.telefono)}">📞 ${esc(t.telefono)}</a>` : "";
    const ig       = t.instagram ? t.instagram.replace(/^@/, "") : "";
    const igLink   = ig ? `<a href="https://instagram.com/${esc(ig)}" target="_blank" rel="noopener">📷 @${esc(ig)}</a>` : "";
    const contact  = (tel || igLink) ? `<div class="contact">${tel}${igLink}</div>` : "";
    const dir      = `https://www.openstreetmap.org/directions?to=${t.lat},${t.lng}`;
    return `<div class="pop"><b>${esc(t.pedido)}</b><br>${tag}${when}${contact}
      <div class="actions"><a class="go" href="${dir}" target="_blank" rel="noopener">Cómo llegar</a></div>
    </div>`;
  }

  function render(){
    Object.values(markers).forEach(m => map.removeLayer(m));
    let open = 0;
    tickets.forEach(t => {
      if (t.status !== "closed") open++;
      const m = L.marker([t.lat, t.lng], { icon: icon(t) })
        .addTo(map)
        .bindPopup(popupHtml(t));
      markers[t.id] = m;
    });
    document.getElementById("count-open").textContent = open;
  }

  // ---------- Backend ----------
  async function loadTickets(){
    if (LOCAL){
      try { tickets = JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch(e){ tickets = []; }
      render(); emit("tickets:loaded", tickets); return;
    }
    try {
      const r    = await fetch(CONFIG.API_URL, { method: "GET" });
      const data = await r.json();
      tickets = Array.isArray(data) ? data : (data.tickets || []);
      render(); emit("tickets:loaded", tickets);
    } catch(e){
      toast("No se pudo cargar. Intenta de nuevo.");
    }
  }

  async function send(action, payload){
    if (LOCAL){
      if (action === "add") tickets.push(payload);
      localStorage.setItem(LS_KEY, JSON.stringify(tickets));
      return { ok: true };
    }
    const r = await fetch(CONFIG.API_URL, {
      method:  "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body:    JSON.stringify({ action, ...payload })
    });
    return r.json();
  }

  // ---------- Selección de ubicación ----------
  function setPick(latlng){
    pickLatLng = latlng;
    if (pickMarker) map.removeLayer(pickMarker);
    pickMarker = L.marker(latlng, {
      icon: L.divIcon({
        className: "", iconSize: [22, 29], iconAnchor: [11, 29],
        html: `<svg viewBox="0 0 24 32" width="22" height="29" xmlns="http://www.w3.org/2000/svg" style="display:block;filter:drop-shadow(0 1px 4px rgba(10,166,184,.55))">
          <path d="M12 0C7.6 0 4 3.6 4 8c0 6 8 20 8 20s8-14 8-20c0-4.4-3.6-8-8-8z" fill="var(--signal)"/>
          <circle cx="12" cy="8" r="3.5" fill="white" opacity=".9"/>
        </svg>`
      })
    }).addTo(map);
    const box = document.getElementById("locbox");
    box.textContent = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
    box.classList.add("set");
  }

  map.on("click", e => {
    if (document.getElementById("sheet").classList.contains("show")) setPick(e.latlng);
  });

  document.getElementById("use-gps").addEventListener("click", () => {
    if (!navigator.geolocation){ formErr("Tu equipo no permite geolocalización. Toca el mapa."); return; }
    formErr("");
    navigator.geolocation.getCurrentPosition(
      pos => {
        const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
        map.setView(ll, 16); setPick(ll);
      },
      () => formErr("No pudimos obtener tu ubicación. Toca el mapa para marcarla."),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });

  // ---------- Form: abrir / cerrar ----------
  const sheet = document.getElementById("sheet");
  const scrim = document.getElementById("scrim");
  function openSheet()  { sheet.classList.add("show");    scrim.classList.add("show"); }
  function closeSheet() { sheet.classList.remove("show"); scrim.classList.remove("show"); }
  document.getElementById("open-form").addEventListener("click", openSheet);
  document.getElementById("close-form").addEventListener("click", closeSheet);
  scrim.addEventListener("click", closeSheet);
  function formErr(m){ document.getElementById("form-err").textContent = m || ""; }

  // ---------- Submit ----------
  sheet.addEventListener("submit", async e => {
    e.preventDefault();
    const telefono  = document.getElementById("f-tel").value.trim();
    const pedido    = document.getElementById("f-pedido").value.trim();
    const instagram = document.getElementById("f-ig").value.trim().replace(/^@/, "");

    if (!telefono)   { formErr("El teléfono es obligatorio para que puedan contactarte."); return; }
    if (!pedido)     { formErr("Describe qué necesitas."); return; }
    if (!pickLatLng) { formErr("Marca la ubicación en el mapa o con tu GPS."); return; }
    formErr("");

    const btn = document.getElementById("submit-btn");
    btn.disabled = true; btn.textContent = "Publicando…";

    const t = {
      id:        "t_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
      pedido, categoria, telefono, instagram,
      lat:    +pickLatLng.lat.toFixed(6),
      lng:    +pickLatLng.lng.toFixed(6),
      status: "open",
      ts:     Date.now()
    };

    try {
      await send("add", t);
      tickets.push(t); render(); emit("tickets:loaded", tickets);
      resetForm(); closeSheet(); toast("Pedido publicado. ¡Gracias!");
    } catch(err){
      formErr("No se pudo publicar. Revisa tu conexión e intenta de nuevo.");
    } finally {
      btn.disabled = false; btn.textContent = "Publicar pedido";
    }
  });

  function resetForm(){
    document.getElementById("f-tel").value    = "";
    document.getElementById("f-pedido").value = "";
    document.getElementById("f-ig").value     = "";
    categoria = CATEGORIAS[0].v;
    document.getElementById("chips-cat").querySelectorAll(".chip").forEach((b, i) => {
      b.setAttribute("aria-pressed", i === 0 ? "true" : "false");
      if (i === 0) _chipOn(b, CATEGORIAS[0]); else _chipOff(b);
    });
    if (pickMarker){ map.removeLayer(pickMarker); pickMarker = null; }
    pickLatLng = null;
    const box = document.getElementById("locbox");
    box.textContent = "Elige en el mapa o usa tu GPS →";
    box.classList.remove("set");
  }

  // ---------- Sistema de eventos para los módulos ----------
  const _hooks = {};
  function on(ev, fn){ (_hooks[ev] || (_hooks[ev] = [])).push(fn); return window.TicketApp; }
  function emit(ev, data){ (_hooks[ev] || []).forEach(fn => { try{ fn(data); }catch(e){ console.error("[hook " + ev + "]", e); } }); }

  // ---------- Util ----------
  function esc(s){
    return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }
  function ago(ts){
    const m = Math.round((Date.now() - ts) / 60000);
    if (m < 1) return "recién";
    if (m < 60) return `hace ${m} min`;
    const h = Math.round(m / 60);
    if (h < 24) return `hace ${h} h`;
    return `hace ${Math.round(h / 24)} d`;
  }
  let toastT;
  function toast(msg){
    const el = document.getElementById("toast");
    el.textContent = msg; el.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove("show"), 2600);
  }

  // ---------- API pública para los módulos de features/ ----------
  window.TicketApp = {
    CONFIG, CATEGORIAS, map,
    get tickets(){ return tickets; },
    get markers() { return markers; },
    render, toast, send,
    colorFor, icon, popupHtml, esc, ago,
    on,
    feature(def){
      if (!def || !def.name || typeof def.init !== "function") return;
      const flags = (typeof FEATURES !== "undefined") ? FEATURES : {};
      if (flags[def.name] === false) return;
      try { def.init(window.TicketApp); }
      catch(e){ console.error("[feature " + def.name + "]", e); }
    }
  };

  // ---------- Init ----------
  document.getElementById("mode-label").textContent = LOCAL
    ? "Modo local (sin compartir)"
    : "En vivo · colaborativo";
  if (LOCAL) document.getElementById("banner").classList.add("show");
  loadTickets();
  if (!LOCAL) setInterval(loadTickets, 30000);
})();
</script>
<!-- ===== MÓDULOS (features/) — se activan/desactivan con FEATURES en el <head> ===== -->
<script src="features/panel.js"></script>
<script src="features/recent.js"></script>
</body>
</html>
